map:
  name: obs5x5_easy
  path: obs5x5_easy.h5
  grid:
    M: 5
    N: 5
    obstacles: [[2, 1], [2, 3]]

# Planning problems (multiple per file)
problems:
  # Single robot baseline
  baseline:
    start: [0, 0]
    goal: [4, 4]
    time_limit: null
  
  # Two robots crossing paths
  two_robots:
    time_limit: 15
    robots:
      robot_0:
        start: [0, 0]
        goal: [4, 4]
        start_time: 0
        priority: 1.0
        safety_radius: 0.5
      robot_1:
        start: [4, 0]
        goal: [0, 4]
        start_time: 0
        priority: 1.0
        safety_radius: 0.5
  
  # Three robots with different priorities
  three_robots:
    time_limit: 18
    robots:
      high_priority:
        start: [0, 0]
        goal: [4, 4]
        start_time: 0
        priority: 2.0
        safety_radius: 0.5
      medium_priority:
        start: [4, 0]
        goal: [0, 4]
        start_time: 0
        priority: 1.0
        safety_radius: 0.5
      low_priority:
        start: [0, 4]
        goal: [4, 0]
        start_time: 1
        priority: 0.5
        safety_radius: 0.5
  
  # Four robots - corners to opposite corners
  four_robots_corners:
    time_limit: 20
    robots:
      robot_0:
        start: [0, 0]
        goal: [4, 4]
        start_time: 0
        priority: 1.0
        safety_radius: 0.5
      robot_1:
        start: [4, 0]
        goal: [0, 4]
        start_time: 0
        priority: 1.0
        safety_radius: 0.5
      robot_2:
        start: [0, 4]
        goal: [4, 0]
        start_time: 0
        priority: 1.0
        safety_radius: 0.5
      robot_3:
        start: [4, 4]
        goal: [0, 0]
        start_time: 0
        priority: 1.0
        safety_radius: 0.5
