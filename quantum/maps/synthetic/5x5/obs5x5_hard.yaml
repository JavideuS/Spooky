map:
  name: obs5x5_hard
  path: obs5x5_hard.h5
  grid:
    M: 5
    N: 5
    obstacles: [[4, 2], [3, 3], [2, 3], [1, 3]]

# Planning problems (multiple per file)
problems:
  baseline:
    start: [4, 0]
    goal: [0, 4]
    time_limit: null
  hard:
    start: [4, 3]
    goal: [4, 0]
    time_limit: 14
  hard_alt:
    start: [4, 0]
    goal: [4, 3]
    time_limit: 14
  
  # Two robots - challenging paths
  two_robots:
    time_limit: 20
    robots:
      robot_0:
        start: [0, 0]
        goal: [4, 4]
        start_time: 0
        priority: 1.0
        safety_radius: 0.5
      robot_1:
        start: [0, 4]
        goal: [4, 0]
        start_time: 0
        priority: 1.0
        safety_radius: 0.5
  
  # Three robots navigating around obstacles
  three_robots:
    time_limit: 25
    robots:
      robot_0:
        start: [0, 0]
        goal: [4, 4]
        start_time: 0
        priority: 1.0
        safety_radius: 0.5
      robot_1:
        start: [4, 0]
        goal: [0, 4]
        start_time: 0
        priority: 1.0
        safety_radius: 0.5
      robot_2:
        start: [0, 2]
        goal: [4, 2]
        start_time: 2
        priority: 1.5
        safety_radius: 0.5
  
  # Five robots - high density scenario
  five_robots:
    time_limit: 30
    robots:
      robot_0:
        start: [0, 0]
        goal: [4, 4]
        start_time: 0
        priority: 1.0
        safety_radius: 0.5
      robot_1:
        start: [4, 0]
        goal: [0, 4]
        start_time: 0
        priority: 1.0
        safety_radius: 0.5
      robot_2:
        start: [0, 4]
        goal: [4, 0]
        start_time: 1
        priority: 1.2
        safety_radius: 0.5
      robot_3:
        start: [4, 4]
        goal: [0, 0]
        start_time: 1
        priority: 1.2
        safety_radius: 0.5
      robot_4:
        start: [0, 1]
        goal: [4, 1]
        start_time: 2
        priority: 0.8
        safety_radius: 0.5
