map:
  name: obs5x5_medium
  path: obs5x5_medium.h5
  grid:
    M: 5
    N: 5
    obstacles: [[1, 1], [2, 2], [3, 3]]

# Planning problems (multiple per file)
problems:
  baseline:
    start: [4, 0]
    goal: [0, 4]
    time_limit: null
  easy:
    start: [4, 0]
    goal: [0, 1]
    time_limit: 6
  
  # Two robots avoiding center obstacles
  two_robots:
    time_limit: 18
    robots:
      robot_0:
        start: [0, 0]
        goal: [4, 4]
        start_time: 0
        priority: 1.0
        safety_radius: 0.5
      robot_1:
        start: [4, 0]
        goal: [0, 4]
        start_time: 0
        priority: 1.0
        safety_radius: 0.5
  
  # Three robots with diagonal obstacles
  three_robots:
    time_limit: 20
    robots:
      robot_0:
        start: [0, 0]
        goal: [4, 4]
        start_time: 0
        priority: 1.2
        safety_radius: 0.5
      robot_1:
        start: [4, 0]
        goal: [0, 4]
        start_time: 0
        priority: 1.0
        safety_radius: 0.5
      robot_2:
        start: [0, 4]
        goal: [4, 0]
        start_time: 1
        priority: 0.8
        safety_radius: 0.5
