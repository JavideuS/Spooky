map:
  name: no_obs3x3_mix
  path: no_obs3x3_mix.h5
  grid:
    M: 3
    N: 3
    obstacles: []  # Static obstacles (rarely changes)

  # Elevation: base height + local changes
  elevation:
    base_height: 1.0
    modifications:
      - positions:
          - [0, 0]
          - [0, 1]
          - [1, 0]
        height: 0.8
      - positions:
          - [2, 1]
          - [2, 2]
          - [1, 2]
        height: 1.6
  
  # Terrain: base material + exceptions
  terrain:
    base_material: ceramic
    # List of overrides (more scalable than full matrix)
    modifications:
      - positions:
          - [0, 0]
          - [0, 1]
          - [1, 0]
        type: water